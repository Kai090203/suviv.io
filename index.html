<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Smart Storm Navigation - Global Routing (Fixed Wrap Bug)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --danger: #ff3333; --safe: #00ffaa; --ship: #ffff00; --typhoon: #ff88ff; --evade: #ffaa00; }
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #111; color: #eee; }
        #map { height: 100vh; width: 100%; background: #001122; }
        #bridge-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(5, 15, 30, 0.92); padding: 25px; border-radius: 12px;
            border: 2px solid #335588; width: 380px; box-shadow: 0 0 20px rgba(0,0,0,1);
            backdrop-filter: blur(5px);
        }
        .status-bar { height: 10px; background: #222; border-radius: 5px; margin: 5px 0 15px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: 0.1s linear; }
        #engine-bar { background: linear-gradient(90deg, var(--safe), var(--danger)); }
        #hull-bar { background: var(--safe); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; margin-bottom: 15px; }
        .data-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; }
        .label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
        
        .port-select { width: 100%; padding: 8px; margin-bottom: 10px; background: #001122; color: #fff; border: 1px solid #335588; border-radius: 4px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 15px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: #0055ff; }
        .btn-start:hover:not(:disabled) { background: #0077ff; }
        .btn-start:disabled { background: #333; cursor: not-allowed; color: #777; }
        .btn-reset { background: #cc3300; }
        .btn-reset:hover { background: #ff4400; }
    </style>
</head>
<body>

<div id="bridge-panel">
    <h2 style="margin:0 0 15px; color:var(--safe); font-size:1.4rem;">🚢 GLOBAL AUTOPILOT</h2>
    
    <div id="mission-text" style="font-size: 13px; margin-bottom: 15px; color: #ccc; line-height: 1.5; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px;">
        1. 출항지와 목적지를 선택하십시오.<br>
        2. 지도에 <b>태풍의 예상 경로</b>를 클릭하여 그리십시오.<br>
        * AI가 육지를 알아서 피해 가며, 태풍 접근 시 피항합니다.
    </div>

    <select id="start-port" class="port-select" onchange="updatePorts()">
        <option value="" disabled selected>출발 항구 선택</option>
        <option value="35.1,129.6">🇰🇷 대한민국 부산항</option>
        <option value="35.6,140.2">🇯🇵 일본 도쿄항</option>
        <option value="31.2,122.0">🇨🇳 중국 상하이항</option>
        <option value="1.2,104.2">🇸🇬 싱가포르항</option>
        <option value="14.5,121.0">🇵🇭 필리핀 마닐라항</option>
        <option value="-33.8,151.5">🇦🇺 호주 시드니항</option>
        <option value="21.3,-157.8">🇺🇸 하와이 호놀룰루항</option>
        <option value="33.7,-118.5">🇺🇸 미국 LA 롱비치항</option>
    </select>

    <select id="end-port" class="port-select" onchange="updatePorts()">
        <option value="" disabled selected>목적지 항구 선택</option>
        <option value="35.1,129.6">🇰🇷 대한민국 부산항</option>
        <option value="35.6,140.2">🇯🇵 일본 도쿄항</option>
        <option value="31.2,122.0">🇨🇳 중국 상하이항</option>
        <option value="1.2,104.2">🇸🇬 싱가포르항</option>
        <option value="14.5,121.0">🇵🇭 필리핀 마닐라항</option>
        <option value="-33.8,151.5">🇦🇺 호주 시드니항</option>
        <option value="21.3,-157.8">🇺🇸 하와이 호놀룰루항</option>
        <option value="33.7,-118.5">🇺🇸 미국 LA 롱비치항</option>
    </select>

    <div class="data-grid">
        <div class="data-item"><span class="label">SHIP SPEED</span><span id="txt-speed" style="font-weight:bold;">0.0 kts</span></div>
        <div class="data-item"><span class="label">WIND SPEED</span><span id="txt-wind" style="font-weight:bold;">0.0 m/s</span></div>
        <div class="data-item" style="grid-column: span 2;"><span class="label">AUTOPILOT STATUS</span><span id="txt-status" style="font-weight:bold; color:var(--ship);">STANDBY</span></div>
    </div>

    <div class="label">ENGINE LOAD</div>
    <div class="status-bar"><div id="engine-bar" class="bar-fill" style="width: 0%;"></div></div>
    
    <div class="label">HULL INTEGRITY</div>
    <div class="status-bar"><div id="hull-bar" class="bar-fill" style="width: 100%;"></div></div>

    <div class="btn-group">
        <button id="start-btn" class="btn btn-start" onclick="engage()" disabled>항해 개시</button>
        <button class="btn btn-reset" onclick="location.reload()">초기화</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // [버그 수정 구역] 지도 무한 반복 현상 끄기 & 바운더리 제한
    const map = L.map('map', {
        maxBounds: [[-90, -180], [90, 180]], // 시야를 하나의 지구본으로 제한
        maxBoundsViscosity: 1.0,             // 경계선 밖으로 드래그 금지
        worldCopyJump: false
    }).setView([20, 140], 3);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13, 
        noWrap: true, // 핵심: 타일 무한 복사 방지
        bounds: [[-90, -180], [90, 180]],
        attribution: 'Tiles &copy; Esri &mdash; Ocean Base'
    }).addTo(map);

    let shipPos = null, targetPos = null, typhPoints = [];
    let shipMkr, targetMkr, shipPath, typhLine;
    let typhOuter, typhInner, typhEye;
    let stage = 0; 

    // 주요 대륙 경계선 (경도 정규화 적용)
    function isGrounded(lat, lng) {
        let nLng = lng;
        while(nLng > 180) nLng -= 360;
        while(nLng < -180) nLng += 360;

        if (lat > 20 && nLng > 90 && nLng < 121.5) return true; // 중국/동남아
        if (lat > 34.5 && lat < 43 && nLng > 125.5 && nLng < 129.5) return true; // 한반도
        if (lat > 33 && lat < 41 && nLng > 130 && nLng < 140) return true; // 일본
        if (lat > 22 && lat < 25.5 && nLng > 120 && nLng < 122) return true; // 대만
        if (lat < -10 && nLng > 110 && nLng < 155) return true; // 호주
        if (lat > 15 && lat < 70 && nLng > -130 && nLng < -80) return true; // 북미
        return false;
    }

    function updatePorts() {
        const startVal = document.getElementById('start-port').value;
        const endVal = document.getElementById('end-port').value;
        
        if (startVal && endVal) {
            if (startVal === endVal) {
                alert("출발지와 목적지가 같습니다. 다시 선택해주세요.");
                return;
            }

            shipPos = startVal.split(',').map(Number);
            targetPos = endVal.split(',').map(Number);

            if (shipMkr) map.removeLayer(shipMkr);
            if (targetMkr) map.removeLayer(targetMkr);
            if (shipPath) map.removeLayer(shipPath);

            shipMkr = L.circleMarker(shipPos, {radius: 7, color: '#ffff00', fillOpacity: 1, zIndexOffset: 1000}).addTo(map);
            targetMkr = L.marker(targetPos).addTo(map).bindPopup("목적지").openPopup();
            shipPath = L.polyline([shipPos], {color: '#ffff00', weight: 3, opacity: 0.8}).addTo(map);
            
            stage = 1; 
            map.fitBounds([shipPos, targetPos], {padding: [50, 50]});
        }
    }

    map.on('click', e => {
        if (stage !== 1) return; 
        
        // [버그 수정 구역] 마우스 클릭 경도를 -180 ~ 180 사이로 무조건 환산
        let cleanLng = e.latlng.lng;
        while (cleanLng > 180) cleanLng -= 360;
        while (cleanLng < -180) cleanLng += 360;
        const p = [e.latlng.lat, cleanLng];
        
        typhPoints.push(p);
        if (!typhLine) typhLine = L.polyline([], {color: '#ff4444', dashArray: '5,10'}).addTo(map);
        typhLine.addLatLng(p);
        L.circleMarker(p, {radius: 4, color: '#ff4444', fillOpacity: 1}).addTo(map);
        
        if (typhPoints.length >= 2) {
            document.getElementById('start-btn').disabled = false;
        }
    });

    function engage() {
        document.getElementById('start-btn').disabled = true;
        document.getElementById('start-port').disabled = true;
        document.getElementById('end-port').disabled = true;
        
        const startP = typhPoints[0];
        typhOuter = L.circle(startP, {radius: 400000, color: 'transparent', fillColor: '#5555ff', fillOpacity: 0.1}).addTo(map);
        typhInner = L.circle(startP, {radius: 120000, color: 'transparent', fillColor: '#ff3333', fillOpacity: 0.2}).addTo(map);
        typhEye   = L.circle(startP, {radius: 20000, color: '#ffffff', weight: 2, fillColor: '#000000', fillOpacity: 0.6}).addTo(map);

        let tStep = 0;
        let curTyph = [...typhPoints[0]]; 
        let hull = 100;
        let isEvadeMode = false; 

        const sim = setInterval(() => {
            if (tStep >= typhPoints.length - 1) {
                curTyph = [999, 999]; 
            } else {
                const pTarget = typhPoints[tStep + 1];
                const dyT = pTarget[0] - curTyph[0];
                const dxT = pTarget[1] - curTyph[1];
                const distT = Math.sqrt(dxT * dxT + dyT * dyT);
                
                const typhSpeed = 0.08; 
                if (distT < typhSpeed) tStep++; 
                else {
                    curTyph[0] += (dyT / distT) * typhSpeed;
                    curTyph[1] += (dxT / distT) * typhSpeed;
                }
            }

            let intensityMod = 1.0;
            if (curTyph[0] > 30) intensityMod -= (curTyph[0] - 30) * 0.08; 
            else if (curTyph[0] < 22) intensityMod += 0.2;
            if (isGrounded(curTyph[0], curTyph[1])) intensityMod *= 0.4;
            intensityMod = Math.max(0.2, Math.min(intensityMod, 1.5));
            
            typhOuter.setRadius(400000 * Math.sqrt(intensityMod));
            typhInner.setRadius(120000 * Math.sqrt(intensityMod));
            typhOuter.setLatLng(curTyph);
            typhInner.setLatLng(curTyph);
            typhEye.setLatLng(curTyph);

            let nLngShip = shipPos[1], nLngTyph = curTyph[1], nLngTarget = targetPos[1];
            if (Math.abs(nLngShip - nLngTyph) > 180) nLngTyph += (nLngTyph < nLngShip) ? 360 : -360;
            if (Math.abs(nLngShip - nLngTarget) > 180) nLngTarget += (nLngTarget < nLngShip) ? 360 : -360;

            const dx = (nLngShip - nLngTyph) * 111 * Math.cos(curTyph[0] * Math.PI / 180); 
            const dy = (shipPos[0] - curTyph[0]) * 111;
            const distFromEye = Math.max(Math.sqrt(dx * dx + dy * dy), 0.1); 
            
            let windSpeed = 0;
            if (distFromEye < 20) windSpeed = 3; 
            else if (distFromEye < 120 * Math.sqrt(intensityMod)) windSpeed = (60 * (20 / distFromEye) + 20) * intensityMod; 
            else if (distFromEye < 400 * Math.sqrt(intensityMod)) windSpeed = (25 * (150 / distFromEye)) * intensityMod;
            else windSpeed = 5; 

            const windAngle = Math.atan2(dy, dx) + Math.PI / 2 + 0.25;
            const windV = { x: Math.cos(windAngle) * windSpeed, y: Math.sin(windAngle) * windSpeed };

            let steerAngle = Math.atan2(targetPos[0] - shipPos[0], nLngTarget - nLngShip); 
            let statusText = "대양 횡단 정상 항해 중";
            let statusColor = "var(--ship)";

            const dangerRadius = 350 * Math.sqrt(intensityMod);
            const clearRadius = 500 * Math.sqrt(intensityMod);

            if (distFromEye < dangerRadius) isEvadeMode = true; 
            else if (distFromEye > clearRadius) isEvadeMode = false;

            if (isEvadeMode) {
                const dyT = typhPoints[tStep + 1] ? typhPoints[tStep + 1][0] - curTyph[0] : 1;
                const dxT = typhPoints[tStep + 1] ? typhPoints[tStep + 1][1] - curTyph[1] : 0;
                const typhHeading = Math.atan2(dyT, dxT);
                const crossProduct = (dxT * dy) - (dyT * dx); 

                if (crossProduct < 0) {
                    steerAngle = typhHeading - (Math.PI / 2.2); 
                    statusText = "비상 대피: 위험반원 우현 이탈"; statusColor = "var(--danger)";
                } else {
                    steerAngle = typhHeading + (Math.PI / 1.3); 
                    statusText = "비상 우회: 가항반원 후방 회피"; statusColor = "var(--evade)";
                }
            }

            let resistance = Math.pow(windSpeed / 15, 2); 
            let basePower = isEvadeMode ? 0.35 : 0.25; 
            let actualEnginePower = Math.max(0.02, basePower - (resistance * 0.008));
            let overload = isEvadeMode ? 50 + (windSpeed * 1.5) : (windSpeed > 20 ? (windSpeed - 20) * 2 : 0);
            actualEnginePower += (overload * 0.002);
            const driftFactor = 0.001; 

            let finalMoveY = 0, finalMoveX = 0;
            let pathClear = false;

            for (let offset = 0; offset <= Math.PI; offset += 0.2) {
                for (let sign of [1, -1]) {
                    if (offset === 0 && sign === -1) continue;
                    let testAngle = steerAngle + (offset * sign);
                    let tY = (Math.sin(testAngle) * actualEnginePower) + (windV.y * driftFactor);
                    let tX = (Math.cos(testAngle) * actualEnginePower) + (windV.x * driftFactor);
                    
                    if (!isGrounded(shipPos[0] + (tY * 8), shipPos[1] + (tX * 8))) {
                        finalMoveY = tY;
                        finalMoveX = tX;
                        pathClear = true;
                        
                        if (offset > 0 && !isEvadeMode) {
                            statusText = "연안 항해: 육지 우회 기동 중";
                            statusColor = "var(--safe)";
                        }
                        break;
                    }
                }
                if (pathClear) break;
            }

            if (!pathClear) {
                statusText = "항로 막힘 / 좌초 위험!";
                statusColor = "var(--danger)";
                actualEnginePower = 0; 
            } else {
                shipPos = [shipPos[0] + finalMoveY, shipPos[1] + finalMoveX];
                
                if (shipPos[1] > 180) shipPos[1] -= 360;
                if (shipPos[1] < -180) shipPos[1] += 360;

                if (windSpeed > 35 && distFromEye > 20) hull -= (windSpeed * 0.003); 
            }

            shipMkr.setLatLng(shipPos);
            shipPath.addLatLng(shipPos);
            
            document.getElementById('txt-speed').innerText = actualEnginePower > 0 ? (Math.sqrt(finalMoveX**2 + finalMoveY**2) * 60).toFixed(1) + " kts" : "0.0 kts";
            document.getElementById('txt-wind').innerText = windSpeed.toFixed(1) + " m/s";
            document.getElementById('txt-status').innerText = statusText;
            document.getElementById('txt-status').style.color = statusColor;
            
            document.getElementById('engine-bar').style.width = Math.min(100, (100 + overload) / 1.5) + "%";
            document.getElementById('hull-bar').style.width = Math.max(0, hull) + "%";
            if (hull < 30) document.getElementById('hull-bar').style.background = "var(--danger)";

            let dYTarget = targetPos[0] - shipPos[0];
            let dXTarget = nLngTarget - (shipPos[1] > 0 && nLngTarget < 0 ? shipPos[1] - 360 : (shipPos[1] < 0 && nLngTarget > 0 ? shipPos[1] + 360 : shipPos[1]));
            let distToTarget = Math.sqrt(dYTarget**2 + dXTarget**2);

            if (distToTarget < 0.8) {
                clearInterval(sim);
                document.getElementById('mission-text').innerHTML = "<b style='color:var(--safe)'>항해 완료: 목적 항구에 무사히 입항했습니다.</b>";
                document.getElementById('txt-status').innerText = "ARRIVED SAFELY";
            } else if (hull <= 0) {
                clearInterval(sim);
                document.getElementById('txt-status').innerText = "SHIPWRECKED";
            }

        }, 40);
    }
</script>
</body>
</html>
